appId: com.flagfrolictrivia.app
productName: Flag Frolic Trivia
directories:
  buildResources: assets
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
win:
  target:
    - nsis
    - portable
  nsis:
    oneClick: false
    allowToChangeInstallationDirectory: true
    createDesktopShortcut: true
    createStartMenuShortcut: true
    shortcutName: Flag Frolic Trivia