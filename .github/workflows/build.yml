name: Build Game
on: [push]

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Añadimos el flag para saltar errores de versiones incompatibles entre librerías
        run: npm install --legacy-peer-deps

      - name: Build Web App
        # CI: false evita que el build se detenga por simples advertencias (warnings)
        run: npm run build
        env:
          CI: false

      - name: Build Electron App
        # Esto genera los ejecutables (.exe y .AppImage)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-${{ matrix.os }}
          path: dist_electron/*.*
